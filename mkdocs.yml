site_name: Foundational Methods
site_description: Foundational Methods pages, including onboarding for the pillar / research subgroup
site_url: https://mi-erasmusmc.github.io/foundational-methods/

nav:
  - Home: index.md
  - Research: research.md
  - Department of Medical Informatics: department-of-medical-informatics.md

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid.js

extra:
  generator: false
